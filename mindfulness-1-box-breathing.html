<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Box Breathing · Mindful Moment</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1c2e;
    --accent: #7ecaca;
    --soft: #c8dede;
    --text: #e8f2f2;
    --muted: #557070;
    --card: rgba(255,255,255,0.03);
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Jost', sans-serif;
    font-weight: 200;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 25% 20%, rgba(126,202,202,0.10) 0%, transparent 55%),
                radial-gradient(ellipse at 80% 85%, rgba(126,202,202,0.06) 0%, transparent 50%);
    pointer-events: none;
  }
  .tag { font-size: 0.6rem; letter-spacing: 0.35em; text-transform: uppercase; color: var(--accent); margin-bottom: 0.6rem; opacity: 0; animation: fadeUp 0.8s 0.1s forwards; }
  h1 { font-family: 'Cormorant Garamond', serif; font-weight: 300; font-size: clamp(2.2rem, 6vw, 3.8rem); color: var(--soft); letter-spacing: 0.04em; text-align: center; margin-bottom: 0.4rem; opacity: 0; animation: fadeUp 0.8s 0.2s forwards; }
  .desc { font-size: 0.82rem; color: var(--muted); letter-spacing: 0.12em; text-align: center; margin-bottom: 3rem; opacity: 0; animation: fadeUp 0.8s 0.35s forwards; }
  .circle-wrap { position: relative; width: 200px; height: 200px; margin-bottom: 2rem; opacity: 0; animation: fadeUp 0.8s 0.5s forwards; }
  .circle-wrap svg { position: absolute; inset: -16px; width: calc(100% + 32px); height: calc(100% + 32px); transform: rotate(-90deg); }
  .ring-bg { fill: none; stroke: rgba(126,202,202,0.12); stroke-width: 2; }
  .ring-fg { fill: none; stroke: var(--accent); stroke-width: 2; stroke-linecap: round; transition: stroke-dashoffset 1s linear; }
  .circle-inner { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.25rem; border: 1px solid rgba(126,202,202,0.15); border-radius: 50%; }
  .phase-label { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.4rem; color: var(--accent); }
  .count-display { font-size: 3rem; font-weight: 200; color: var(--text); line-height: 1; }
  .btn { background: transparent; border: 1px solid rgba(126,202,202,0.35); color: var(--accent); font-family: 'Jost', sans-serif; font-size: 0.7rem; letter-spacing: 0.25em; text-transform: uppercase; padding: 0.75rem 2.5rem; cursor: pointer; transition: all 0.3s ease; margin-bottom: 2.5rem; opacity: 0; animation: fadeUp 0.8s 0.65s forwards; }
  .btn:hover { background: rgba(126,202,202,0.08); border-color: var(--accent); }
  .steps { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; max-width: 320px; width: 100%; opacity: 0; animation: fadeUp 0.8s 0.75s forwards; }
  .step { background: var(--card); border: 1px solid rgba(255,255,255,0.05); border-radius: 6px; padding: 0.9rem; text-align: center; }
  .step-num { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; color: var(--accent); line-height: 1; margin-bottom: 0.15rem; }
  .step-text { font-size: 0.65rem; letter-spacing: 0.12em; color: var(--muted); text-transform: uppercase; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<p class="tag">Mindful Moment · 01</p>
<h1>Box Breathing</h1>
<p class="desc">4 counts in &nbsp;·&nbsp; 4 hold &nbsp;·&nbsp; 4 out &nbsp;·&nbsp; 4 hold</p>

<div class="circle-wrap">
  <svg viewBox="0 0 232 232">
    <circle class="ring-bg" cx="116" cy="116" r="108"/>
    <circle class="ring-fg" id="ring" cx="116" cy="116" r="108"/>
  </svg>
  <div class="circle-inner">
    <div class="phase-label" id="phase">Ready</div>
    <div class="count-display" id="count">—</div>
  </div>
</div>

<button class="btn" id="startBtn" onclick="startBreathing()">Begin</button>

<div class="steps">
  <div class="step"><div class="step-num">4</div><div class="step-text">Inhale</div></div>
  <div class="step"><div class="step-num">4</div><div class="step-text">Hold</div></div>
  <div class="step"><div class="step-num">4</div><div class="step-text">Exhale</div></div>
  <div class="step"><div class="step-num">4</div><div class="step-text">Hold</div></div>
</div>

<script>
  const phases = [
    { name: 'Inhale', duration: 4 },
    { name: 'Hold', duration: 4 },
    { name: 'Exhale', duration: 4 },
    { name: 'Hold', duration: 4 },
  ];
  const ring = document.getElementById('ring');
  const C = 2 * Math.PI * 108;
  ring.style.strokeDasharray = C;
  ring.style.strokeDashoffset = C;
  let running = false, iv = null;

  function startBreathing() {
    if (running) return;
    running = true;
    document.getElementById('startBtn').textContent = 'Breathing...';
    let pi = 0, rounds = 0;
    runPhase();
    function runPhase() {
      if (rounds >= 4) {
        document.getElementById('phase').textContent = 'Complete';
        document.getElementById('count').textContent = '✓';
        document.getElementById('startBtn').textContent = 'Begin';
        ring.style.transition = 'stroke-dashoffset 0.5s ease';
        ring.style.strokeDashoffset = C;
        running = false; return;
      }
      const p = phases[pi];
      document.getElementById('phase').textContent = p.name;
      let cnt = p.duration;
      document.getElementById('count').textContent = cnt;
      const segSize = C / 4;
      const startOff = C - pi * segSize;
      const endOff = startOff - segSize;
      ring.style.transition = 'none';
      ring.style.strokeDashoffset = startOff;
      setTimeout(() => {
        ring.style.transition = `stroke-dashoffset ${p.duration}s linear`;
        ring.style.strokeDashoffset = endOff;
      }, 50);
      iv = setInterval(() => {
        cnt--;
        document.getElementById('count').textContent = cnt;
        if (cnt <= 0) {
          clearInterval(iv);
          pi++;
          if (pi >= phases.length) { pi = 0; rounds++; }
          runPhase();
        }
      }, 1000);
    }
  }
</script>
</body>
</html>
